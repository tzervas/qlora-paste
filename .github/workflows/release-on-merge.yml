name: release-on-merge
# Automated release + crates.io publish when a version bump lands on the default
# branch. On push to master/main it checks whether Cargo.toml's version already has
# a matching `v<version>` tag; if NOT, it gates (test/clippy/fmt), publishes to
# crates.io, tags the commit, then cuts a GitHub release from the CHANGELOG.
# Publish runs BEFORE the cosmetic release step so nothing can block it; the
# release step uses the REST API (no `gh` binary on the self-hosted runner) and is
# non-fatal. Idempotent: existing tag → no-op; already-on-index → skip publish.
# Requires the CARGO_REGISTRY_TOKEN repo secret.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: ver
        name: Read version + decide if release needed
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already tagged — nothing to release."
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "New version $VERSION — will release."
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.ver.outputs.release_needed == 'true'

      - name: Sync hardcoded doc versions to release version
        if: steps.ver.outputs.release_needed == 'true'
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Keep src html_root_url in lock-step with the crate version so it never
          # drifts. (README badges are dynamic shields.io — no sync needed there.)
          sed -i -E "s|(html_root_url = \"https://docs.rs/qlora-paste/)[0-9]+\.[0-9]+\.[0-9]+\"|\1$V\"|" src/lib.rs || true
          if ! git diff --quiet; then
            git config user.name tzervas
            git config user.email albedo.black.1@gmail.com
            git add -A
            git commit -m "docs: sync html_root_url to v$V [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Gate — test / clippy / fmt
        if: steps.ver.outputs.release_needed == 'true'
        run: |
          set -euo pipefail
          cargo test --all-features
          cargo clippy --all-targets --all-features -- -D warnings
          cargo fmt --all -- --check

      # Publish is the critical, order-sensitive deliverable and runs BEFORE the
      # cosmetic GitHub-release step, so a release-API hiccup can never block the
      # crates.io publish (which is exactly what happened when `gh` was absent on
      # the self-hosted runner and its exit-127 aborted the job before publish).
      # Idempotent: if the version is already on the sparse index we treat it as
      # done, so re-runs and any publish/tag ordering are safe.
      - name: Publish to crates.io
        if: steps.ver.outputs.release_needed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Sparse-index path: first2/next2/name (crates named >=4 chars).
          # -F: fixed-string match so the version's dots can't act as regex wildcards.
          IDX="https://index.crates.io/ql/or/qlora-paste"
          if curl -sf -H "User-Agent: qlora-paste-release-ci" "$IDX" | grep -Fq "\"vers\":\"$V\""; then
            echo "v$V already on crates.io — skipping publish (idempotent)."
          elif [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            # Fail loudly: do NOT let the later step tag a version we never published
            # (that reintroduces the stale-tag trap). Missing secret is a real error.
            echo "CARGO_REGISTRY_TOKEN not set and v$V not on crates.io — cannot publish." >&2
            exit 1
          else
            cargo publish
          fi

      - name: Tag release commit
        if: steps.ver.outputs.release_needed == 'true'
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "v$V" >/dev/null 2>&1; then
            echo "tag v$V already exists — skipping."
          else
            git tag "v$V"
            git push origin "v$V"
          fi

      # Cosmetic: cut a GitHub release from the CHANGELOG. Uses the REST API via
      # curl (no `gh` binary on the self-hosted podman runner) and is non-fatal —
      # the crate is already published + tagged by the time we get here.
      - name: GitHub release (non-fatal)
        if: steps.ver.outputs.release_needed == 'true'
        # Explicitly non-fatal: the crate is already published + tagged, so a
        # release-API failure (or a missing tool like python3) must never fail the
        # job. Belt-and-suspenders with the in-script error handling below.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -uo pipefail
          NOTES=$(awk -v v="$V" '$0 ~ "^## \\[" v "\\]"{f=1;next} f&&/^## \[/{exit} f' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release v$V"
          BODY=$(printf '%s' "$NOTES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          code=$(curl -s -o /tmp/gh_rel.json -w '%{http_code}' -X POST \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"tag_name\":\"v$V\",\"name\":\"v$V\",\"body\":$BODY}")
          if [ "$code" = "201" ]; then
            echo "GitHub release v$V created."
          else
            echo "GitHub release POST returned $code (non-fatal; crate published + tagged):" >&2
            cat /tmp/gh_rel.json >&2 || true
          fi
