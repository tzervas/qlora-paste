# Upstream paste CI matrix, adapted ONLY for self-hosted runner labels.
# Source of truth: https://github.com/dtolnay/paste/blob/master/.github/workflows/ci.yml
# (archived read-only 2024-10-06). Changes vs upstream:
#   - pre_ci reusable workflow from dtolnay/.github is inlined as a no-op gate
#     (external reusable workflow may be unavailable / archive-coupled)
#   - MSRV job is a matrix over 1.31.0 -> 1.96.0 (lib build) validating the full range
#   - test matrix includes 1.85.0 instead of 1.56.0
#   - checkout action kept at v4 to match upstream file; runners must support it
# Bar: "upstream's own CI would have accepted this" for the equivalent jobs.

name: Upstream CI (self-hosted)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  pre_ci:
    name: Pre-CI gate
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 10
    outputs:
      continue: ${{ steps.gate.outputs.continue }}
    steps:
      - id: gate
        run: echo "continue=true" >> "$GITHUB_OUTPUT"

  test:
    name: Rust ${{matrix.rust}}
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: [self-hosted, linux, x64, podman]
    strategy:
      fail-fast: false
      # Cap concurrent rungs. The self-hosted podman fleet is memory-capped; running every
      # rung at once meant multiple simultaneous `rustup toolchain install` + build processes,
      # which the OOM killer terminated mid-install (exit 137). Serialize into small batches.
      max-parallel: 2
      matrix:
        rust: [nightly, beta, stable, 1.85.0]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
      - name: Enable type layout randomization
        run: echo RUSTFLAGS=${RUSTFLAGS}\ -Zrandomize-layout >> $GITHUB_ENV
        if: matrix.rust == 'nightly'
      - run: cargo test
      - uses: actions/upload-artifact@v4
        if: matrix.rust == 'nightly' && always()
        with:
          name: Cargo.lock
          path: Cargo.lock

  msrv:
    name: Build @ Rust ${{ matrix.rust }}
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # Cap concurrent rungs — see the OOM note on the test matrix above. Seven simultaneous
      # toolchain installs + lib builds on the memory-capped fleet OOM-killed rustup (exit 137).
      max-parallel: 2
      matrix:
        # Full compat spread: declared MSRV 1.31 (upstream paste's floor) up through
        # current. Lib-only `cargo build` — proves the crate COMPILES on each toolchain
        # without pulling dev-deps (trybuild/rustversion) that don't support old Rust.
        rust: ["1.31.0", "1.45.2", "1.56.1", "1.65.0", "1.74.1", "1.85.0", "1.96.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      # Validate the LIBRARY's MSRV: strip dev/build-deps (cargo-husky etc.) whose
      # modern manifests old cargo cannot resolve. Consumers never get dev-deps.
      - name: Strip dev-dependencies for MSRV lib check
        run: |
          python3 ci/msrv-strip-devdeps.py Cargo.toml
          rm -f Cargo.lock
      - name: Build (lib only) on ${{ matrix.rust }}
        run: cargo build --lib --verbose
  doc:
    name: Documentation
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 45
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      # Self-hosted: dtolnay/install binary is not on the runner (exit 127).
      # Install cargo-docs-rs so package.metadata.docs.rs is honored.
      # Zero-dependency proc-macro crate: no docs.rs metadata tool needed on the
      # self-hosted runner. Plain `cargo doc` under RUSTDOCFLAGS=-Dwarnings is the
      # real documentation gate and needs no external binary.
      - run: cargo doc --no-deps --all-features

  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@clippy
      - run: cargo clippy --tests -- -Dclippy::all -Dclippy::pedantic

  miri:
    name: Miri
    needs: pre_ci
    if: needs.pre_ci.outputs.continue
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@miri
      - run: cargo miri setup
      - run: cargo miri test
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  outdated:
    name: Outdated
    runs-on: [self-hosted, linux, x64, podman]
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
      # Self-hosted: dtolnay/install@cargo-outdated uses gh attestation verify + a
      # prebuilt binary that is not on this runner (exit 127). Install via cargo.

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Zero-dependency crate: nothing can be out of date. cargo-outdated
      # (and its dtolnay attestation binary) are unavailable on the runner,
      # so assert the zero-dep invariant with the built-in resolver instead.
      # cargo-outdated (+ its dtolnay attestation binary) is unavailable on the
      # self-hosted runner. Use the built-in resolver: report available updates
      # without failing, and assert zero RUNTIME deps (dev-deps like trybuild are
      # expected and excluded).
      - name: Dependency freshness (tool-free)
        run: |
          set -euo pipefail
          cargo update --locked --dry-run || true
          rt=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import sys,json;m=json.load(sys.stdin);print(sum(1 for p in m['packages'] for d in p['dependencies'] if (d.get('kind') in (None,'normal'))))")
          echo "runtime dependencies: $rt"
          test "$rt" -eq 0 || { echo "expected zero runtime deps; got $rt" >&2; exit 1; }
  fmt:
    name: Format
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
